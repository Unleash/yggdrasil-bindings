on:
  push:
    branches:
      - main
    paths:
      - yggdrasilffi/**/*.rs
      - yggdrasilffi/**/*.toml
      - java-engine/**/*.java
      - .github/workflows/validate-java-bindings-load.yml
  pull_request:
    paths:
      - yggdrasilffi/**/*.rs
      - yggdrasilffi/**/*.toml
      - java-engine/**/*.java
      - .github/workflows/validate-java-bindings-load.yml
  workflow_dispatch:


jobs:
  prepare-engine:
    runs-on: ubuntu-latest
    outputs:
      lib_version: ${{ steps.read_java_engine.outputs.java_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Read yggdrasilCoreVersion from gradle.properties
        id: read_ygg
        shell: bash
        working-directory: "./java-engine"
        run: |
          # Grab the last non-comment match in case the file has multiple entries
          line="$(grep -E '^[[:space:]]*yggdrasilCoreVersion[[:space:]]*=' gradle.properties | tail -n1 || true)"
          if [ -z "$line" ]; then
            echo "yggdrasilCoreVersion not found in gradle.properties" >&2
            exit 1
          fi

          # Extract the value (right side of =) and trim whitespace/CRLF
          value="${line#*=}"
          # trim leading/trailing spaces
          value="$(printf '%s' "$value" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"
          # strip possible CR from Windows checkouts
          value="${value%$'\r'}"

          echo "ygg_version=$value" >> "$GITHUB_OUTPUT"
      - name: Read java library version from gradle.properties
        id: read_java_engine
        shell: bash
        working-directory: ./java-engine
        run: |
          # Grab the last non-comment match in case the file has multiple entries
          line="$(grep -E '^[[:space:]]*version[[:space:]]*=' gradle.properties | tail -n1 || true)"
          if [ -z "$line" ]; then
            echo "version not found in gradle.properties" >&2
            exit 1
          fi
          
          # Extract the value (right side of =) and trim whitespace/CRLF
          value="${line#*=}"
          # trim leading/trailing spaces
          value="$(printf '%s' "$value" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"
          # strip possible CR from Windows checkouts
          value="${value%$'\r'}"
          
          echo "java_version=$value" >> "$GITHUB_OUTPUT"
      - name: Download binaries
        shell: bash
        working-directory: ./java-engine
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "yggdrasilffi-v${{ steps.read_ygg.outputs.ygg_version }}" --repo Unleash/yggdrasil-bindings -D binaries/
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          cache: 'gradle'
          distribution: 'temurin'
      - name: Publish java-engine to ci-repo
        working-directory: "./java-engine"
        shell: bash
        run: |
         ./gradlew publishAllPublicationsToCiRepository
      - name: Upload ci-repo
        uses: actions/upload-artifact@v7
        with:
          name: ci-maven-repo
          path: java-engine/build/ci-repo
  verify:
    needs: prepare-engine
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs-on: ubuntu-24.04
            gradle-task: runJvmProbe

          - arch: x86_64
            runs-on: ubuntu-24.04
            gradle-task: buildGraalProbe

          - arch: x86_64
            runs-on: ubuntu-24.04
            gradle-task: buildGraalMostlyStatic

          - arch: x86_64
            runs-on: ubuntu-24.04
            gradle-task: buildGraalStaticMusl

          - arch: arm64
            runs-on: ubuntu-24.04-arm
            gradle-task: runJvmProbe

          - arch: arm64
            runs-on: ubuntu-24.04-arm
            gradle-task: buildGraalProbe

          - arch: arm64
            runs-on: ubuntu-24.04-arm
            gradle-task: buildGraalMostlyStatic

          - arch: arm64
            runs-on: ubuntu-24.04-arm
            gradle-task: buildGraalStaticMusl

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: '25'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Download library repo
        uses: actions/download-artifact@v8
        with:
          name: ci-maven-repo
          path: .ci-maven-repo


      - name: Install base native prerequisites
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            zlib1g-dev \
            pkg-config \
            file \
            curl

      - name: Verify host static zlib exists
        if: matrix.gradle-task == 'buildGraalMostlyStatic'
        run: |
          set -euo pipefail
          find /usr/lib /lib -name 'libz.a' -print
          test -n "$(find /usr/lib /lib -name 'libz.a' -print -quit)"

      - name: Build musl toolchain with zlib
        if: matrix.gradle-task == 'buildGraalStaticMusl'
        shell: bash
        run: |
          set -euo pipefail

          MUSL_HOME="$RUNNER_TEMP/musl-toolchain"
          echo "MUSL_HOME=$MUSL_HOME" >> "$GITHUB_ENV"
          mkdir -p "$MUSL_HOME"

          curl -fsSLO https://musl.libc.org/releases/musl-1.2.5.tar.gz
          tar -xzf musl-1.2.5.tar.gz
          pushd musl-1.2.5
          ./configure --prefix="$MUSL_HOME" --static
          make -j"$(nproc)"
          make install
          popd

          curl -fsSLO https://zlib.net/fossils/zlib-1.3.1.tar.gz
          tar -xzf zlib-1.3.1.tar.gz
          pushd zlib-1.3.1
          CC="$MUSL_HOME/bin/musl-gcc" ./configure --prefix="$MUSL_HOME" --static
          make -j"$(nproc)"
          make install
          popd
          arch="$(uname -m)"
          case "$arch" in
            x86_64)
              target="x86_64-linux-musl"
              ;;
            aarch64)
              target="aarch64-linux-musl"
              ;;
            *)
              echo "Unsupported architecture: $arch" >&2
              exit 1
              ;;
          esac
          
          ln -s "$MUSL_HOME/bin/musl-gcc" "$MUSL_HOME/bin/${target}-gcc"
          echo "$MUSL_HOME/bin" >> "$GITHUB_PATH"

          echo "CC=$MUSL_HOME/bin/musl-gcc" >> "$GITHUB_ENV"
          echo "CXX=$MUSL_HOME/bin/musl-gcc" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$MUSL_HOME/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "C_INCLUDE_PATH=$MUSL_HOME/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=$MUSL_HOME/lib" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$MUSL_HOME/lib" >> "$GITHUB_ENV"

      - name: Verify musl zlib exists
        if: matrix.gradle-task == 'buildGraalStaticMusl'
        run: |
          set -euo pipefail
          find "$MUSL_HOME" -name 'libz.a' -print
          test -f "$MUSL_HOME/lib/libz.a"

      - name: Run selected Gradle task
        working-directory: "java-engine/buildvalidator"
        env:
          LIB_VERSION: ${{ needs.prepare-engine.outputs.lib_version }}
          CI_MAVEN_REPO: ${{ github.workspace }}/.ci-maven-repo
        run: |
          ./gradlew --no-daemon --stacktrace ${{ matrix.gradle-task }}

      - name: Smoke-run produced native binary
        working-directory: "java-engine/buildvalidator"
        if: matrix.gradle-task == 'buildGraalProbe'
        run: ./build/native/nativeCompile/unleash-engine-probe-graal

      - name: Smoke-run mostly-static binary
        working-directory: "java-engine/buildvalidator"
        if: matrix.gradle-task == 'buildGraalMostlyStatic'
        run: ./build/native/nativeCompile/unleash-engine-probe-mostly-static

      - name: Smoke-run static musl binary
        working-directory: "java-engine/buildvalidator"
        if: matrix.gradle-task == 'buildGraalStaticMusl'
        run: ./build/native/nativeCompile/unleash-engine-probe-static-musl